name: build
on:
  push:
    branches:
      - master
    paths-ignore:
      - '.idea/**'
      - 'jitpack.yml'
      - '**/.gitignore'
      - '**/*.md'
      - '.github/**.md'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'gradle/**'
      - 'samples/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'generic-datastore-core/build.gradle.kts'
      - 'generic-datastore-core/src/**'
      - 'generic-datastore-preferences/build.gradle.kts'
      - 'generic-datastore-preferences/src/**'
      - 'generic-datastore-proto/build.gradle.kts'
      - 'generic-datastore-proto/src/**'
      - 'generic-datastore/build.gradle.kts'
      - 'generic-datastore/src/**'
      - 'generic-datastore-compose/build.gradle.kts'
      - 'generic-datastore-compose/src/**'
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  JAVA_DISTRO: 'temurin'

concurrency:
  group: ${{ github.ref }}-build
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  Build-Android:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build app
        run: |
          ./gradlew :samples:preferenceAndroidApp:assembleRelease --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
  
  Build-Desktop:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create distributable
        run: |
          ./gradlew :samples:protoComposeApp:createReleaseDistributable
  
  Compile-IOS:
    timeout-minutes: 60
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create Release for Generic Datastore
        run: |
          ./gradlew :generic-datastore:publishIosArm64PublicationToMavenLocal

      - name: Create Release for Generic Datastore Preferences
        run: |
          ./gradlew :generic-datastore-preferences:publishIosArm64PublicationToMavenLocal

      - name: Create Release for Generic Datastore Proto
        run: |
          ./gradlew :generic-datastore-proto:publishIosArm64PublicationToMavenLocal

      - name: Compile Generic Datastore Compose for iOS
        run: |
          ./gradlew :generic-datastore-compose:compileKotlinIosArm64
