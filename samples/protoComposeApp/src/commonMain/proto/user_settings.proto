syntax = "proto2";

package protoapp;

option java_package = "io.github.arthurkun.generic.datastore.proto.app.wire";

message UserSettings {
  optional string username = 1;
  optional int32 age = 2;
  optional bool dark_mode = 3;
  optional Theme theme = 4;
  optional Address address = 5;
  optional string theme_raw = 6;
  repeated string theme_set_raw = 7;
  optional string json_raw = 8;
  optional string nullable_json_raw = 9;
  optional string json_list_raw = 10;
  optional string nullable_json_list_raw = 11;
  repeated string json_set_raw = 12;

  enum Theme {
    SYSTEM = 0;
    LIGHT = 1;
    DARK = 2;
  }

  message Address {
    optional string street = 1;
    optional string city = 2;
    optional string zip_code = 3;
  }
}
